name: Terraform Plan and Apply (Approved)

on:
  pull_request:

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      tfvars_file:
        description: "Path to tfvars file"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:

  plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          TFVARS_ARG=""

          if [ -n "${{ github.event.inputs.tfvars_file }}" ]; then
            if [ ! -f "${{ github.event.inputs.tfvars_file }}" ]; then
              echo "tfvars file not found: ${{ github.event.inputs.tfvars_file }}"
              exit 1
            fi
            TFVARS_ARG="-var-file=${{ github.event.inputs.tfvars_file }}"
          fi

          terraform plan -out=tfplan $TFVARS_ARG

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan


  apply:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    needs: plan

    environment:
      name: production   # requires approval in GitHub UI

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
